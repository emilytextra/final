<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Inventory Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #add8e6; /* Light blue background */
    }

    .container {
      width: 80%;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }

    h1 {
      text-align: center;
    }

    /* Menu bar styling */
    .menu-bar {
      display: flex;
      justify-content: center;
      background-color: #007bff;
      padding: 10px;
    }

    .menu-bar a {
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      font-size: 18px;
      text-align: center;
    }

    .menu-bar a:hover {
      background-color: #0056b3;
      border-radius: 4px;
    }

    form {
      margin-bottom: 20px;
    }

    label {
      margin-right: 10px;
    }

    input[type="text"],
    input[type="number"] {
      padding: 8px;
      margin-right: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 8px 16px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .clear-button {
      background-color: #d9534f; /* Darker red */
      margin-top: 20px;
    }

    .clear-button:hover {
      background-color: #b52b27; /* Even darker red */
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #007bff;
      color: white;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Menu bar -->
  <div class="menu-bar">
    <a href="index.html">Dashboard</a>
    <a href="profile.html">Profile</a>
  </div>

  <div class="container">
    <h1>Warehouse Inventory Dashboard</h1>

    <!-- Form to add items -->
    <form id="addItemForm">
      <label for="itemName">Item Name:</label>
      <input type="text" id="itemName" name="itemName" placeholder="Enter item name" required>
      
      <label for="itemQuantity">Quantity:</label>
      <input type="number" id="itemQuantity" name="itemQuantity" placeholder="Enter quantity" required>
      
      <button type="submit">Add Item</button>
    </form>

    <!-- Table to display inventory -->
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be added dynamically -->
      </tbody>
    </table>

    <!-- Button to clear all items -->
    <button id="clearAllButton" class="clear-button">Clear All Items</button>

    <!-- Chart container -->
    <div style="width: 100%; height: 400px;">
      <canvas id="inventoryChart"></canvas>
    </div>
  </div>

  <script>
    const form = document.getElementById('addItemForm');
    const tableBody = document.querySelector('#inventoryTable tbody');
    const inventoryChartCtx = document.getElementById('inventoryChart').getContext('2d');
    const clearAllButton = document.getElementById('clearAllButton');

    let items = [];
    let quantities = [];
    let colors = [];

    // Initialize Chart.js
    const inventoryChart = new Chart(inventoryChartCtx, {
      type: 'bar',
      data: {
        labels: items,
        datasets: [{
          label: 'Item Quantities',
          data: quantities,
          backgroundColor: colors,
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    // Validate input fields and prevent duplication
    function isValidItem(itemName, itemQuantity) {
      // Prevent duplicate items
      if (items.includes(itemName)) {
        alert('Item already exists in the inventory.');
        return false;
      }

      // Prevent negative quantities
      if (itemQuantity <= 0) {
        alert('Quantity must be a positive number.');
        return false;
      }

      return true;
    }

    // Add item to table and chart
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const itemName = document.getElementById('itemName').value;
      const itemQuantity = parseInt(document.getElementById('itemQuantity').value);

      // Validate item
      if (!isValidItem(itemName, itemQuantity)) return;

      // Add row to the table
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${itemName}</td>
        <td>${itemQuantity}</td>
      `;
      tableBody.appendChild(row);

      // Update chart data and bar color
      items.push(itemName);
      quantities.push(itemQuantity);
      colors.push(itemQuantity < 10 ? '#b52b27' : 'rgba(75, 192, 192, 0.2)'); // Darker red for low stock

      inventoryChart.update();

      // Save to localStorage
      localStorage.setItem('items', JSON.stringify(items));
      localStorage.setItem('quantities', JSON.stringify(quantities));
      localStorage.setItem('colors', JSON.stringify(colors));

      // Clear form fields
      form.reset();
    });

    // Clear all items from table, chart, and localStorage
    clearAllButton.addEventListener('click', () => {
      tableBody.innerHTML = '';
      items.length = 0;
      quantities.length = 0;
      colors.length = 0;
      inventoryChart.update();
      localStorage.clear();
      alert('All items have been cleared!');
    });
  </script>
</body>
</html>
